version: '3.8'
services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka_producer
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    ports:
      - "9092:9092"
      - "9093:9093"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - app-network
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "9090:8080"  # Важно: внутри контейнера UI слушает порт 8080
    environment:
      # Конфигурация кластера Kafka
      KAFKA_CLUSTERS_0_NAME: "local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka_producer:9092"
      # Метаданные кластера (опционально)
      KAFKA_CLUSTERS_0_METRICS_PORT: 9092
      # Таймауты и настройки
      KAFKA_CLUSTERS_0_READONLY: "false"
      # Логирование
      LOGGING_LEVEL_ROOT: "INFO"
    depends_on:
      - kafka
    networks:
      - app-network
  producer:
    build: .
    container_name: producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: user-transactions
      # MESSAGES_COUNT: "100"
      # INTERVAL_MS: "1000"
    depends_on:
      - kafka
    networks:
      - app-network
volumes:
  kafka_data:
networks:
  app-network:
    driver: bridge
    name: spark-network

